/* ══════════════════════════════════════════════════════
   UTILITY HOOKS
   ══════════════════════════════════════════════════════ */
function useScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById('scroll-progress');
    const fn=()=>{const h=document.documentElement.scrollHeight-window.innerHeight;if(bar)bar.style.width=(h>0?(window.scrollY/h)*100:0)+'%'};
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
}

/* Motion wrapper — graceful fallback if framer-motion fails */
const M=({children,className='',delay=0,y=40,once=true,amount=0.15,...rest})=>{
  const ref=useRef(null);
  if(!motion){return <div ref={ref} className={className} {...rest}>{children}</div>}
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y}}
      whileInView={{opacity:1,y:0}}
      viewport={{once,amount}}
      transition={{duration:1,delay,ease:[.23,1,.32,1]}}
      {...rest}
    >{children}</motion.div>
  );
};

/* Hero-specific motion (uses animate instead of whileInView for first paint) */
const MHero=({children,className='',delay=0,y=40})=>{
  const ref=useRef(null);
  const inView=useInView?useInView(ref,{once:true,amount:0.1}):true;
  if(!motion)return<div ref={ref} className={className}>{children}</div>;
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y,scale:y>30?.97:1}}
      animate={inView?{opacity:1,y:0,scale:1}:{}}
      transition={{duration:1.2,delay,ease:[.23,1,.32,1]}}
    >{children}</motion.div>
  );
};

function Navigation(){

  const links=[{l:'About',h:'#identity'},{l:'Innovation',h:'#innovation'},{l:'Projects',h:'#projects'},{l:'Field Work',h:'#fieldwork'},{l:'Team',h:'#people'},{l:'Legal',h:'#legal'},{l:'Contact',h:'#contact'}];

  return(
    <nav className={`fixed top-0 left-0 right-0 z-[9999] transition-all duration-700 ${scrolled?'bg-brand-dark/90 backdrop-blur-2xl shadow-lg shadow-black/20':'bg-transparent'}`} style={{height:56}}>

        </a>
        <div className="hidden lg:flex items-center gap-0.5">
          {links.map(({l,h})=>(
            <a key={h} href={h} className="text-[11px] font-semibold px-4 py-2 rounded-full transition-all duration-300 hover:bg-white/[.07]" style={{color:'rgba(255,255,255,.5)',letterSpacing:'.04em'}}>{l}</a>
          ))}
        </div>
        <button className="lg:hidden p-2 -mr-2" onClick={()=>setOpen(!open)} aria-label="Menu">
          {open?Icons.x:Icons.menu}
        </button>
      </div>
      {open&&(

          ))}

  );
}

/* ══════════════════════════════════════════════════════
   SCENE 6 — PEOPLE
   ══════════════════════════════════════════════════════ */
function People(){
  const founder=PEOPLE.filter(p=>p.level==='founder');
  const cLevel=PEOPLE.filter(p=>p.level==='c-level');
  const team=PEOPLE.filter(p=>p.level==='team');

  const Card=({person,size='md',delay=0})=>{
    const sz=size==='lg'?'w-36 h-36 md:w-40 md:h-40':'w-24 h-24 md:w-28 md:h-28';
    return(
      <M delay={delay} className="group text-center">
        <div className={`mx-auto rounded-2xl overflow-hidden mb-4 ${sz} ring-2 ring-white/[.04] group-hover:ring-brand-blue/30 transition-all duration-700`} style={{background:'rgba(255,255,255,.03)'}}>
          <img src={person.photo} alt={person.name} className="img-cover transition-all duration-700 grayscale group-hover:grayscale-0 group-hover:scale-105" onError={e=>{e.target.parentElement.innerHTML='<div class="w-full h-full flex items-center justify-center text-2xl" style="color:rgba(255,255,255,.1)">'+person.name[0]+'</div>'}}/>
        </div>
        <h4 className={`font-bold leading-tight ${size==='lg'?'text-base':'text-[13px]'}`}>{person.name}</h4>
        <p className="text-[11px] mt-1.5 font-semibold" style={{color:'#2E7AB8'}}>{person.role}</p>
        <p className="text-[10px] mt-1" style={{color:'rgba(255,255,255,.25)'}}>{person.expertise}</p>
      </M>
    );
  };

  return(
    <section id="people" className="relative py-28 md:py-40" style={{background:'#0a1628'}}>
      <div className="max-w-6xl mx-auto px-6 lg:px-10">
        <div className="text-center mb-16 md:mb-20">
          <M><p className="text-[11px] font-bold tracking-[.25em] uppercase mb-4" style={{color:'#2E7AB8'}}>The People</p></M>
          <M delay={.1}><h2 className="text-[clamp(2rem,5vw,3.5rem)] font-black tracking-tight">Built by Experts</h2></M>
          <M delay={.2}><p className="mt-4 text-[15px] max-w-md mx-auto" style={{color:'rgba(255,255,255,.3)'}}>A multidisciplinary team of marine scientists, engineers, and strategists.</p></M>
        </div>

        {/* Founder */}
        <div className="mb-16">
          <M><p className="text-center text-[10px] font-bold tracking-[.2em] uppercase mb-8" style={{color:'rgba(255,255,255,.15)'}}>Founder</p></M>
          <div className="flex justify-center">{founder.map((p,i)=><Card key={p.id} person={p} size="lg" delay={i*.1}/>)}</div>
        </div>

        {/* Divider */}
        <div className="w-16 h-px mx-auto mb-16" style={{background:'linear-gradient(90deg,transparent,rgba(46,122,184,.3),transparent)'}}/>

        {/* C-Level */}
        <div className="mb-16">
          <M><p className="text-center text-[10px] font-bold tracking-[.2em] uppercase mb-8" style={{color:'rgba(255,255,255,.15)'}}>Leadership</p></M>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-8 md:gap-10 justify-items-center">{cLevel.map((p,i)=><Card key={p.id} person={p} size="lg" delay={i*.1}/>)}</div>
        </div>

        <div className="w-16 h-px mx-auto mb-16" style={{background:'linear-gradient(90deg,transparent,rgba(46,122,184,.3),transparent)'}}/>

        {/* Team */}
        <div>
          <M><p className="text-center text-[10px] font-bold tracking-[.2em] uppercase mb-8" style={{color:'rgba(255,255,255,.15)'}}>Research Team</p></M>
          <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-6 md:gap-8 justify-items-center">{team.map((p,i)=><Card key={p.id} person={p} size="md" delay={i*.07}/>)}</div>
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════════
   APP
   ══════════════════════════════════════════════════════ */
function App(){
  useScrollProgress();
  useEffect(()=>{
    const loader=document.getElementById('app-loader');
    const t=setTimeout(()=>{if(loader)loader.classList.add('hidden')},1800);
    return()=>clearTimeout(t);
  },[]);

  return(
    <>
      <Navigation/>
      <main>
        <Hero/>
        <Identity/>
        <Innovation/>
        <Projects/>
        <FieldWork/>
        <People/>
        <Legal/>
        <Closing/>
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
