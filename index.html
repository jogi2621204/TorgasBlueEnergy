/* ══════════════ HOOKS ══════════════ */
function useScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById('scroll-progress');
    const fn=()=>{const h=document.documentElement.scrollHeight-window.innerHeight;if(bar)bar.style.width=(h>0?(window.scrollY/h)*100:0)+'%'};
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
}

/* Scroll-triggered motion wrapper */
const M=({children,className='',delay=0,y=50,once=true,amount=0.12,...rest})=>{
  const ref=useRef(null);
  if(!motion)return<div ref={ref} className={className} {...rest}>{children}</div>;
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y}}
      whileInView={{opacity:1,y:0}}
      viewport={{once,amount}}
      transition={{duration:1.1,delay,ease:[.23,1,.32,1]}}
      {...rest}
    >{children}</motion.div>
  );
};

/* Hero-specific (uses animate for first-paint trigger) */
const MH=({children,className='',delay=0,y=50})=>{
  const ref=useRef(null);
  const inView=useInView?useInView(ref,{once:true,amount:.05}):true;
  if(!motion)return<div ref={ref} className={className}>{children}</div>;
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y,scale:y>35?.97:1}}
      animate={inView?{opacity:1,y:0,scale:1}:{}}
      transition={{duration:1.3,delay,ease:[.23,1,.32,1]}}
    >{children}</motion.div>
  );
};

function Navigation(){
  const[scrolled,setScrolled]=useState(false);
  const[open,setOpen]=useState(false);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>60);window.addEventListener('scroll',fn,{passive:true});return()=>window.removeEventListener('scroll',fn)},[]);
  const links=[{l:'About',h:'#identity'},{l:'News',h:'#news'},{l:'Projects',h:'#projects'},{l:'Field Work',h:'#fieldwork'},{l:'Team',h:'#people'},{l:'Lab System',h:'#labsystem'},{l:'Legal',h:'#legal'},{l:'Contact',h:'#contact'}];

  const lc=scrolled?'#4a6b8a':'rgba(255,255,255,.7)';
  return(
    <nav className="fixed top-0 left-0 right-0 z-[9999] transition-all duration-500"
         style={{height:64,background:scrolled?'rgba(255,255,255,.97)':'transparent',backdropFilter:scrolled?'blur(20px)':'none',borderBottom:scrolled?'1px solid rgba(46,122,184,.1)':'none',boxShadow:scrolled?'0 1px 20px rgba(12,31,53,.07)':'none'}}>

        <a href="#hero" className="flex items-center gap-3 group">

          <span className="text-sm font-bold tracking-wide transition-all duration-500"
                style={{color:scrolled?'#0c1f35':'rgba(255,255,255,.9)',opacity:scrolled?1:0,transform:scrolled?'translateY(0)':'translateY(-3px)'}}>Torgas Blue Energy</span>
        </a>
        <div className="hidden lg:flex items-center gap-1">
          {links.map(({l,h})=>(
            <a key={h} href={h} className="text-sm font-medium px-4 py-2 rounded-full transition-all duration-300"
               style={{color:lc}}
               onMouseEnter={e=>e.currentTarget.style.background=scrolled?'rgba(46,122,184,.07)':'rgba(255,255,255,.1)'}
               onMouseLeave={e=>e.currentTarget.style.background='transparent'}>{l}</a>
          ))}
        </div>
        <button className="lg:hidden p-2 -mr-2" onClick={()=>setOpen(!open)} aria-label="Menu"
                style={{color:scrolled?'#0c1f35':'rgba(255,255,255,.9)'}}>
          {open?IC.x:IC.menu}
        </button>
      </div>
      {open&&(
        <div className="lg:hidden absolute top-16 left-0 right-0 backdrop-blur-2xl border-t px-6 py-6 shadow-xl"
             style={{background:'rgba(255,255,255,.97)',borderColor:'rgba(46,122,184,.1)'}}>
          {links.map(({l,h})=>(
            <a key={h} href={h} onClick={()=>setOpen(false)} className="block py-3.5 text-base font-semibold border-b"
               style={{color:'#2E7AB8',borderColor:'rgba(46,122,184,.08)'}}>{l}</a>
          ))}
        </div>
      )}
    </nav>
  );
}

    <section id="hero" ref={ref} className="relative h-screen min-h-[750px] flex items-center justify-center overflow-hidden">

const NEWS_CATEGORIES=['All','Research','Technology','Field Work','Events'];

function News(){
  const[news,setNews]=useState(STATIC_NEWS);
  const[loading,setLoading]=useState(false);
  const[cat,setCat]=useState('All');
  const[sel,setSel]=useState(null);
  const[idx,setIdx]=useState(0);
  const[dir,setDir]=useState(1);
  const pauseRef=useRef(false);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(!WEBAPI_URL)return;
    setLoading(true);
    fetch(WEBAPI_URL+'?action=news')
      .then(r=>r.json())
      .then(d=>{if(d.success&&d.data&&d.data.length>0)setNews(d.data);})
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[]);

  const filtered=cat==='All'?news:news.filter(n=>n.category===cat);
  useEffect(()=>setIdx(0),[cat]);

  useEffect(()=>{
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      if(!pauseRef.current&&filtered.length>1){setDir(1);setIdx(i=>(i+1)%filtered.length);}
    },6000);
    return()=>clearInterval(timerRef.current);
  },[filtered.length]);

  const go=(n,d)=>{setDir(d);setIdx(n);};
  const prev=()=>go((idx-1+filtered.length)%filtered.length,-1);
  const next=()=>go((idx+1)%filtered.length,1);

  useEffect(()=>{
    const fn=e=>{if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next();};
    window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);
  },[idx,filtered.length]);

  const catColors={'Research':'#2E7AB8','Technology':'#E8812F','Field Work':'#3A8B3E','Events':'#9B6EE8'};
  const fmtDate=d=>{try{const dt=new Date(d);if(isNaN(dt))return d;const dd=String(dt.getDate()).padStart(2,'0');const mm=String(dt.getMonth()+1).padStart(2,'0');return`${dd}/${mm}/${dt.getFullYear()}`;}catch{return d;}};
  const cur=filtered[idx]||filtered[0];

  return(
    <section id="news" className="relative py-28 md:py-36" style={{background:'#f4f9ff'}}>
      <div className="max-w-7xl mx-auto px-6 lg:px-10">

        <M>
          <div className="flex items-center gap-5 mb-4">
            <div className="flex-1 h-px" style={{background:'rgba(46,122,184,.2)'}}/>
            <span className="text-xs font-black tracking-[.28em] uppercase" style={{color:'#2E7AB8'}}>Latest from the Field</span>
            <div className="flex-1 h-px" style={{background:'rgba(46,122,184,.2)'}}/>
          </div>
          <h2 className="text-center text-4xl sm:text-5xl md:text-6xl font-black leading-tight mb-3"
              style={{letterSpacing:'-0.04em',color:'#0c1f35'}}>News &amp; Updates</h2>
          <p className="text-center text-base max-w-lg mx-auto mb-10" style={{color:'#5a7b9a'}}>Research milestones, field dispatches, and technology breakthroughs.</p>
        </M>

        <M delay={.08}>
          <div className="flex items-center justify-center gap-2 flex-wrap mb-10">
            {NEWS_CATEGORIES.map(c=>(
              <button key={c} onClick={()=>setCat(c)}
                className="px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300"
                style={{background:cat===c?'#2E7AB8':'rgba(46,122,184,.07)',color:cat===c?'#fff':'#4a6b8a',border:`1px solid ${cat===c?'#2E7AB8':'rgba(46,122,184,.18)'}`}}>
                {c}
              </button>
            ))}
          </div>
        </M>

        {loading&&(
          <div className="flex justify-center py-24">
            <div className="w-8 h-8 rounded-full border-2 animate-spin" style={{borderColor:'rgba(46,122,184,.2)',borderTopColor:'#2E7AB8'}}/>
          </div>
        )}

        {!loading&&cur&&(
          <div className="relative"
               onMouseEnter={()=>{pauseRef.current=true;}}
               onMouseLeave={()=>{pauseRef.current=false;}}>

            {AnimatePresence?(
              <AnimatePresence mode="wait" custom={dir}>
                <motion.div key={cur.id||idx}
                  custom={dir}
                  initial={d=>({opacity:0,x:d*48})}
                  animate={{opacity:1,x:0}}
                  exit={d=>({opacity:0,x:d*-48})}
                  transition={{duration:.5,ease:[.23,1,.32,1]}}>
                  <NewsSlide cur={cur} onOpen={()=>setSel(cur)} catColors={catColors} fmtDate={fmtDate}/>
                </motion.div>
              </AnimatePresence>
            ):(
              <NewsSlide cur={cur} onOpen={()=>setSel(cur)} catColors={catColors} fmtDate={fmtDate}/>
            )}

            {filtered.length>1&&(
              <>
                <button className="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-5 w-11 h-11 rounded-full flex items-center justify-center z-10 transition-all duration-300 hover:scale-110 shadow-lg hidden md:flex"

function FieldWork(){
  const[lightbox,setLightbox]=useState(null);
  const imgs=ACTIVITIES.map(a=>a.src);

  useEffect(()=>{
    if(lightbox===null)return;
    const fn=e=>{
      if(e.key==='Escape')setLightbox(null);
      if(e.key==='ArrowLeft')setLightbox(l=>l===null?null:(l-1+imgs.length)%imgs.length);
      if(e.key==='ArrowRight')setLightbox(l=>l===null?null:(l+1)%imgs.length);
    };
    window.addEventListener('keydown',fn);
    return()=>window.removeEventListener('keydown',fn);
  },[lightbox]);

function FormModal({sys,onClose}){
  const cfg=FORM_CONFIGS[sys.id];
  const[vals,setVals]=useState({});
  const[submitting,setSubmitting]=useState(false);
  const[done,setDone]=useState(false);
  const[err,setErr]=useState('');
  const[subId,setSubId]=useState('');

  const set=(n,v)=>setVals(p=>({...p,[n]:v}));

  const handleSubmit=async(e)=>{
    e.preventDefault();setSubmitting(true);setErr('');
    try{
      const payload={type:sys.id,activity:cfg.activity,...vals,timestamp:new Date().toISOString()};
      if(!WEBAPI_URL){
        await new Promise(r=>setTimeout(r,700));
        const id=`${sys.id.slice(0,3).toUpperCase()}-${Date.now().toString(36).slice(-5).toUpperCase()}`;
        setSubId(id);setDone(true);return;
      }
      const clientId=`${sys.id.slice(0,3).toUpperCase()}-${Date.now().toString(36).slice(-5).toUpperCase()}`;
      const payloadStr=JSON.stringify({...payload,id:clientId});
      // Native form POST to hidden iframe — bypasses CORS/redirect issues completely
      const f=document.createElement('form');
      f.method='POST';f.action=WEBAPI_URL;f.target='gas-iframe';
      const inp=document.createElement('input');
      inp.type='hidden';inp.name='payload';inp.value=payloadStr;
      f.appendChild(inp);document.body.appendChild(f);f.submit();
      document.body.removeChild(f);
      await new Promise(r=>setTimeout(r,1200)); // give Apps Script time to process
      setSubId(clientId);setDone(true);
    }catch(ex){
      setErr(ex.message||'Submission failed. Please try again.');
    }finally{setSubmitting(false);}
  };

  const iStyle={background:'#f4f9ff',border:'1px solid rgba(46,122,184,.18)',color:'#0c1f35'};
  const iCls='w-full px-4 py-3 rounded-xl text-sm outline-none transition-colors';

  return(
    <div className="fixed inset-0 z-[300] flex items-end sm:items-center justify-center p-0 sm:p-6"
         style={{background:'rgba(12,31,53,.6)',backdropFilter:'blur(24px)'}}
         onClick={onClose}>
      <div className="relative w-full sm:max-w-2xl flex flex-col rounded-t-3xl sm:rounded-3xl overflow-hidden bg-white shadow-2xl"
           style={{border:'1px solid rgba(46,122,184,.12)',maxHeight:'92vh'}}
           onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 px-6 py-4 flex-shrink-0" style={{borderBottom:'1px solid rgba(46,122,184,.08)'}}>
          <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
               style={{background:`${sys.accent}12`,color:sys.accent}}>{IC[sys.icon]}</div>
          <div className="flex-1 min-w-0">
            <h3 className="font-black text-base leading-tight" style={{color:'#0c1f35'}}>{cfg.title}</h3>
            <p className="text-xs mt-0.5" style={{color:'#8aa5bf'}}>Fill all required fields and submit</p>
          </div>
          <span className="text-[10px] font-black tracking-[.15em] uppercase px-2.5 py-1 rounded-full flex-shrink-0 hidden sm:block"
                style={{background:`${sys.accent}12`,color:sys.accent,border:`1px solid ${sys.accent}25`}}>{sys.badge}</span>
          <button onClick={onClose} className="w-9 h-9 flex items-center justify-center rounded-xl transition-all hover:scale-110 flex-shrink-0"
                  style={{background:'rgba(12,31,53,.06)',color:'#5a7b9a'}}>✕</button>
        </div>
        {/* Body */}
        <div className="flex-1 overflow-y-auto px-6 py-6">
          {done?(
            <div className="flex flex-col items-center justify-center py-10 gap-5 text-center">
              <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{background:'rgba(58,139,62,.15)'}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="#3A8B3E" strokeWidth="2.5" className="w-8 h-8"><path d="M20 6L9 17l-5-5"/></svg>
              </div>
              <div>
                <h4 className="text-2xl font-black mb-2">Submitted!</h4>
                <p className="text-sm leading-relaxed max-w-xs" style={{color:'#5a7b9a'}}>
                  {WEBAPI_URL?'Your submission has been recorded in the Lab Calendar.':'Submission recorded locally. Connect the Apps Script backend to save data automatically.'}
                </p>
                {subId&&<p className="mt-3 font-mono text-xs px-3 py-1.5 rounded-lg inline-block" style={{background:'rgba(46,122,184,.1)',color:'#6DB3E8'}}>ID: {subId}</p>}
              </div>
              <button onClick={onClose} className="px-8 py-3 rounded-xl font-bold text-sm transition-all hover:opacity-90"
                      style={{background:sys.accent,color:'#fff'}}>Close</button>
            </div>
          ):(
            <form onSubmit={handleSubmit} className="space-y-4">
              {cfg.fields.map(f=>(
                <div key={f.name}>
                  <label className="block text-xs font-bold mb-1.5 tracking-wide" style={{color:'#4a6b8a'}}>
                    {f.label}{f.required&&<span className="ml-1" style={{color:sys.accent}}>*</span>}
                  </label>
                  {f.type==='select'?(
                    <select value={vals[f.name]||''} onChange={e=>set(f.name,e.target.value)}
                            required={f.required} className={iCls} style={iStyle}>
                      <option value="">Select...</option>
                      {f.options.map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  ):f.type==='textarea'?(
                    <textarea value={vals[f.name]||''} onChange={e=>set(f.name,e.target.value)}
                              required={f.required} rows={3} placeholder={f.placeholder||''}
                              className={iCls+' resize-none'} style={iStyle}/>
                  ):(
                    <input type={f.type} value={vals[f.name]||''} onChange={e=>set(f.name,e.target.value)}
                           required={f.required} placeholder={f.placeholder||''}
                           className={iCls} style={iStyle}/>
                  )}
                </div>
              ))}
              {err&&<p className="text-sm px-4 py-3 rounded-xl" style={{background:'rgba(220,38,38,.08)',color:'#f87171'}}>{err}</p>}
              {!WEBAPI_URL&&(
                <p className="text-xs px-3 py-2.5 rounded-xl" style={{background:'rgba(232,129,47,.07)',color:'rgba(232,129,47,.75)',border:'1px solid rgba(232,129,47,.15)'}}>
                  Demo mode — deploy Apps Script and set WEBAPI_URL to save data to the Lab Calendar.
                </p>
              )}
              <button type="submit" disabled={submitting}
                      className="w-full py-3.5 rounded-xl font-bold text-base transition-all hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed mt-2"
                      style={{background:`linear-gradient(135deg,${sys.accent},${sys.accent}cc)`,color:'#fff'}}>
                {submitting?(
                  <span className="flex items-center justify-center gap-2">
                    <svg className="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10" strokeOpacity=".25"/><path d="M12 2a10 10 0 0110 10" strokeLinecap="round"/></svg>
                    Submitting...
                  </span>
                ):`Submit ${cfg.title}`}
              </button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

    if(!sched.open)return;
    setSchedLoading(true);
    if(!WEBAPI_URL){setSchedLoading(false);setSchedData([]);return;}
    const p=new URLSearchParams();
    if(sched.filter!=='all')p.set('kegiatan',sched.filter);
    if(filterDate)p.set('tanggal',filterDate);
    if(filterStatus!=='all')p.set('status',filterStatus);
    if(filterName)p.set('nama',filterName);
    fetch(`${WEBAPI_URL}?${p.toString()}`).then(r=>r.json()).then(d=>{setSchedData(d.data||[]);}).catch(()=>setSchedData([])).finally(()=>setSchedLoading(false));
  },[sched.open,sched.filter,filterDate,filterStatus,filterName]);

  useEffect(()=>{
    const fn=e=>{if(e.key==='Escape'){setSched(s=>({...s,open:false}));setFormModal(null);};};
    document.addEventListener('keydown',fn);
    return()=>document.removeEventListener('keydown',fn);
  },[]);
  useEffect(()=>{
    document.body.style.overflow=(sched.open||formModal)?'hidden':'';
    return()=>{document.body.style.overflow='';};
  },[sched.open,formModal]);

  const handleAction=async(id,action)=>{
    if(!WEBAPI_URL)return;
    setActionLoading(id+action);
    try{
      const payloadStr=JSON.stringify({action,id});
      const f=document.createElement('form');
      f.method='POST';f.action=WEBAPI_URL;f.target='gas-iframe';
      const inp=document.createElement('input');
      inp.type='hidden';inp.name='payload';inp.value=payloadStr;
      f.appendChild(inp);document.body.appendChild(f);f.submit();
      document.body.removeChild(f);
      await new Promise(r=>setTimeout(r,1200));
      // Optimistic UI update
      setSchedData(prev=>prev.map(r=>r['ID']===id?{...r,Status:action==='approve'?'Approved':'Rejected'}:r));
    }catch(ex){}
    finally{setActionLoading(null);}
  };

  const handleEdit=async(id,newDate,newTime)=>{
    if(!WEBAPI_URL)return;
    setActionLoading(id+'edit');
    try{
      const payloadStr=JSON.stringify({action:'update',id,date:newDate,time:newTime});
      const f=document.createElement('form');
      f.method='POST';f.action=WEBAPI_URL;f.target='gas-iframe';
      const inp=document.createElement('input');
      inp.type='hidden';inp.name='payload';inp.value=payloadStr;
      f.appendChild(inp);document.body.appendChild(f);f.submit();
      document.body.removeChild(f);
      await new Promise(r=>setTimeout(r,1200));
      setSchedData(prev=>prev.map(r=>r['ID']===id?{...r,Date:newDate,Time:newTime}:r));
      setEditRow(null);
    }catch(ex){}
    finally{setActionLoading(null);}
  };

  const handleDelete=async(id)=>{
    if(!WEBAPI_URL)return;
    setActionLoading(id+'delete');
    try{
      const payloadStr=JSON.stringify({action:'delete',id});
      const f=document.createElement('form');
      f.method='POST';f.action=WEBAPI_URL;f.target='gas-iframe';
      const inp=document.createElement('input');
      inp.type='hidden';inp.name='payload';inp.value=payloadStr;
      f.appendChild(inp);document.body.appendChild(f);f.submit();
      document.body.removeChild(f);
      await new Promise(r=>setTimeout(r,1200));
      setSchedData(prev=>prev.filter(r=>r['ID']!==id));
      setDeleteConfirm(null);
    }catch(ex){}
    finally{setActionLoading(null);}
  };

  const openSched=(filter,title)=>{
    setSchedData([]);setFilterDate('');setFilterStatus('all');setFilterName('');
    setSched({open:true,filter,title});
  };

  // Fix 1899 bug: Google Sheets time-only → "1899-12-30Txx:xx:xx.000Z"
  const fmtTime=v=>{
    if(!v||v==='—')return'—';
    const s=String(v);
    if(s.includes('T')||s.includes('1899')){
      try{const d=new Date(s);return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});}catch{return s;}
    }
    return s;
  };
  const toInputDate=v=>{
    if(!v||v==='—')return'';
    const s=String(v).trim();
    // dd/MM/yyyy (our display format from fmtDate)
    const dmy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(dmy)return`${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
    // yyyy-MM-dd or ISO
    try{const d=new Date(s);if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);}catch{}
    return'';
  };
  const toInputTime=v=>{
    if(!v||v==='—')return'';
    const s=String(v);
    if(s.includes('T')||s.includes('1899')){
      try{const d=new Date(s);const h=String(d.getHours()).padStart(2,'0');const m=String(d.getMinutes()).padStart(2,'0');return`${h}:${m}`;}catch{return'';}
    }
    if(/^\d{2}:\d{2}/.test(s))return s.slice(0,5);
    return'';
  };

  const sBadge=s=>{
    const map={Pending:{c:'#E8812F',bg:'rgba(232,129,47,.15)'},Approved:{c:'#3A8B3E',bg:'rgba(58,139,62,.15)'},Rejected:{c:'#dc2626',bg:'rgba(220,38,38,.12)'},Completed:{c:'#6DB3E8',bg:'rgba(109,179,232,.15)'}};
    return map[s]||{c:'#4a6b8a',bg:'rgba(46,122,184,.08)'};
  };

  const aColor={
    'Booking Lab':{bg:'rgba(46,122,184,.12)',c:'#1B5E8A'},
    'Bimbingan':{bg:'rgba(46,122,184,.1)',c:'#1a5276'},
    'Progress Report':{bg:'rgba(58,139,62,.1)',c:'#166534'},
    'K3 Incident':{bg:'rgba(232,129,47,.12)',c:'#9a3412'},
    'Maintenance':{bg:'rgba(155,110,232,.12)',c:'#5B21B6'},
    'Join Application':{bg:'rgba(58,139,62,.1)',c:'#166534'},
    'Procurement Request':{bg:'rgba(13,148,136,.1)',c:'#0f766e'},
  };

  const fmtDate=v=>{if(!v)return'—';try{const dt=new Date(v);if(isNaN(dt))return v;const dd=String(dt.getDate()).padStart(2,'0');const mm=String(dt.getMonth()+1).padStart(2,'0');return`${dd}/${mm}/${dt.getFullYear()}`;}catch{return v;}};

  const DASH=[
    {key:'bookingHariIni',label:'Bookings Today',color:'#2E7AB8',bg:'rgba(46,122,184,.1)',icon:'booking',filter:'Booking Lab'},
    {key:'bimbinganHariIni',label:'Mentoring Today',color:'#3A8B3E',bg:'rgba(58,139,62,.1)',icon:'mentoring',filter:'Bimbingan'},
    {key:'pending',label:'Pending Approval',color:'#E8812F',bg:'rgba(232,129,47,.1)',icon:'clock',filter:'all'},
    {key:'upcoming',label:'Upcoming Schedule',color:'#9B6EE8',bg:'rgba(155,110,232,.1)',icon:'booking',filter:'all'},
  ];

  return(
    <section id="labsystem" className="relative py-32 md:py-44" style={{background:'#ffffff'}}>
      <div className="absolute inset-0 pointer-events-none overflow-hidden">
        <div className="absolute w-[700px] h-[700px] rounded-full" style={{top:'30%',left:'60%',transform:'translate(-50%,-50%)',background:'radial-gradient(circle,rgba(46,122,184,.07) 0%,transparent 65%)',filter:'blur(80px)'}}/>
        <div className="absolute w-[400px] h-[400px] rounded-full" style={{bottom:'10%',left:'10%',background:'radial-gradient(circle,rgba(232,129,47,.05) 0%,transparent 65%)',filter:'blur(60px)'}}/>
      </div>
      <div className="relative z-10 max-w-7xl mx-auto px-6 lg:px-10">

        {/* HEADER */}
        <div className="text-center mb-16">
          <M>
            <div className="flex items-center gap-5 mb-4">
              <div className="flex-1 h-px" style={{background:'rgba(46,122,184,.18)'}}/>
              <span className="text-xs font-black tracking-[.28em] uppercase" style={{color:'#2E7AB8'}}>Lab Operations</span>
              <div className="flex-1 h-px" style={{background:'rgba(46,122,184,.18)'}}/>
            </div>
          </M>
          <M delay={.1}><h2 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black" style={{letterSpacing:'-0.04em',color:'#0c1f35'}}>Lab Integrated<br/><span style={{background:'linear-gradient(135deg,#2E7AB8,#6DB3E8)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>System</span></h2></M>
          <M delay={.2}><p className="mt-6 text-lg md:text-xl max-w-2xl mx-auto" style={{color:'#5a7b9a'}}>One integrated system for all lab operations — bookings, mentoring, reports, safety, and maintenance.</p></M>
        </div>

        {/* DASHBOARD STATS */}
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-16">
          {DASH.map((d,i)=>(
            <M key={d.key} delay={i*.06}>
              <button onClick={()=>openSched(d.filter,'All Schedules')}
                className="group w-full rounded-2xl p-5 text-left transition-all duration-400 hover:-translate-y-1"
                style={{background:'#ffffff',border:`1px solid ${d.color}20`,boxShadow:`0 2px 12px rgba(12,31,53,.06)`}}>
                <div className="flex items-center justify-between mb-4">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{background:`${d.color}12`,color:d.color}}>{IC[d.icon]}</div>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3 h-3 opacity-0 group-hover:opacity-60 transition-opacity" style={{color:d.color}}><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
                <div className="text-3xl md:text-4xl font-black mb-1 tabular-nums" style={{color:d.color,letterSpacing:'-0.03em'}}>
                  {statsLoading?<span className="inline-block w-8 h-7 rounded-lg animate-pulse" style={{background:`${d.color}14`}}/>:stats[d.key]}
                </div>
                <p className="text-xs font-semibold leading-tight" style={{color:'#8aa5bf'}}>{d.label}</p>
              </button>
            </M>
          ))}
        </div>

        {/* 5 SYSTEM CARDS */}
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 mb-12">
          {LAB_SYSTEMS.map((sys,i)=>(
            <M key={sys.id} delay={i*.07}>
              <div className="group relative flex flex-col rounded-3xl overflow-hidden h-full transition-all duration-500 hover:-translate-y-1"
                   style={{background:'#ffffff',border:`1px solid rgba(46,122,184,.09)`,boxShadow:'0 2px 12px rgba(12,31,53,.06)'}}>
                <div className="absolute top-0 left-0 right-0 h-[3px] opacity-0 group-hover:opacity-100 transition-opacity duration-500" style={{background:`linear-gradient(90deg,transparent,${sys.accent},transparent)`}}/>
                <div className="p-7 flex flex-col h-full gap-5">
                  <div className="flex items-start justify-between">
                    <div className="w-12 h-12 rounded-2xl flex items-center justify-center transition-transform duration-500 group-hover:scale-110"
                         style={{background:sys.badgeBg,border:`1px solid ${sys.accent}25`,color:sys.accent}}>
                      {IC[sys.icon]}
                    </div>
                    <span className="text-[10px] font-black tracking-[.18em] uppercase px-3 py-1.5 rounded-full"
                          style={{background:sys.badgeBg,color:sys.badgeColor,border:`1px solid ${sys.badgeColor}30`}}>
                      {sys.badge}
                    </span>
                  </div>
                  <div className="flex-1">
                    <h3 className="text-xl font-black mb-2" style={{color:'#0c1f35',letterSpacing:'-0.02em'}}>{sys.title}</h3>
                    <p className="text-sm leading-relaxed mb-4" style={{color:'#5a7b9a'}}>{sys.desc}</p>
                    <div className="space-y-2">
                      <div className="flex items-start gap-2 text-xs" style={{color:'#8aa5bf'}}><span className="mt-0.5 flex-shrink-0" style={{color:sys.accent}}>{IC.clock}</span><span><strong style={{color:'#5a7b9a'}}>Deadline:</strong> {sys.deadline}</span></div>
                      <div className="flex items-start gap-2 text-xs" style={{color:'#8aa5bf'}}><span className="mt-0.5 flex-shrink-0" style={{color:sys.accent}}>{IC.check}</span><span><strong style={{color:'#5a7b9a'}}>Approval:</strong> {sys.approval}</span></div>
                      <div className="flex items-start gap-2 text-xs" style={{color:'#8aa5bf'}}><span className="mt-0.5 flex-shrink-0" style={{color:sys.accent}}>{IC.user}</span><span><strong style={{color:'#5a7b9a'}}>User:</strong> {sys.users}</span></div>
                    </div>
                  </div>
                  <div className="h-px" style={{background:'rgba(46,122,184,.08)'}}/>
                  <div className="flex gap-3">
                    <button onClick={()=>setFormModal(sys)}
                       className="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all hover:scale-[1.02] hover:shadow-md"
                       style={{background:`linear-gradient(135deg,${sys.accent},${sys.accent}cc)`,color:'#fff'}}>
                      {IC.form} Submit Form
                    </button>
                    <button onClick={()=>openSched(sys.schedFilter,sys.title)}
                      className="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all hover:scale-[1.02]"
                      style={{background:'#f4f9ff',color:'#2E7AB8',border:'1px solid rgba(46,122,184,.2)'}}>
                      {IC.table} View Data
                    </button>
                  </div>
                </div>
              </div>
            </M>
          ))}
        </div>

        {/* LAB CALENDAR QUICK LINK */}
        <M delay={.5}>
          <a href="https://docs.google.com/spreadsheets/d/1q0Lf5cUFUfKvYpQX7wUuoUgQQB3FFp7vJGIMVGIgvfQ/edit"
             target="_blank" rel="noopener"
             className="group flex items-center gap-5 rounded-2xl p-5 transition-all duration-400 hover:-translate-y-0.5"
             style={{background:'#f4f9ff',border:'1px solid rgba(46,122,184,.18)',boxShadow:'0 2px 8px rgba(12,31,53,.05)'}}>
            <div className="w-12 h-12 flex-shrink-0 rounded-xl flex items-center justify-center" style={{background:'rgba(46,122,184,.1)',color:'#2E7AB8'}}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-6 h-6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
            </div>
            <div className="flex-1 min-w-0">
              <p className="font-bold text-sm" style={{color:'#0c1f35'}}>Lab Calendar — Single Source of Truth</p>
              <p className="text-xs mt-0.5 truncate" style={{color:'#8aa5bf'}}>All web form submissions auto-sync to the central Lab Calendar spreadsheet</p>
            </div>
            <div className="flex-shrink-0 opacity-40 group-hover:opacity-80 transition-opacity">{IC.external}</div>
          </a>
        </M>
      </div>

      {/* SCHEDULE / DATA MODAL */}
      {sched.open&&(
        <div className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-0 sm:p-4"
             style={{background:'rgba(12,31,53,.6)',backdropFilter:'blur(20px)'}}
             onClick={()=>setSched(s=>({...s,open:false}))}>
          <div className="relative w-full sm:max-w-6xl flex flex-col rounded-t-3xl sm:rounded-3xl overflow-hidden bg-white shadow-2xl"
               style={{border:'1px solid rgba(46,122,184,.12)',maxHeight:'92vh'}}
               onClick={e=>e.stopPropagation()}>
            <div className="flex items-center gap-4 px-6 py-4 flex-shrink-0" style={{borderBottom:'1px solid rgba(46,122,184,.08)'}}>
              <div className="flex-1 min-w-0">
                <h3 className="font-black text-lg" style={{color:'#0c1f35'}}>{sched.title||'Lab Schedule'}</h3>
                <p className="text-xs mt-0.5" style={{color:'#8aa5bf'}}>{sched.filter==='all'?'All activities':sched.filter} · Lab Calendar</p>
              </div>
              <div className="flex items-center gap-2">
                <a href="https://docs.google.com/spreadsheets/d/1q0Lf5cUFUfKvYpQX7wUuoUgQQB3FFp7vJGIMVGIgvfQ/edit"
                   target="_blank" rel="noopener"
                   className="hidden sm:flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-bold transition-all hover:scale-105"
                   style={{background:'rgba(46,122,184,.15)',color:'#6DB3E8',border:'1px solid rgba(46,122,184,.2)'}}>
                  {IC.external} Lab Calendar
                </a>
                <button onClick={()=>setSched(s=>({...s,open:false}))}
                        className="w-9 h-9 flex items-center justify-center rounded-xl transition-all hover:scale-110"
                        style={{background:'rgba(12,31,53,.06)',color:'#5a7b9a'}}>✕</button>
              </div>
            </div>
            <div className="flex flex-wrap gap-2.5 px-6 py-4 flex-shrink-0" style={{borderBottom:'1px solid rgba(46,122,184,.07)',background:'#f8fbff'}}>
              <div className="flex rounded-xl overflow-hidden" style={{border:'1px solid rgba(46,122,184,.15)'}}>
                {[['all','All'],['Booking Lab','Booking'],['Bimbingan','Mentoring'],['Progress Report','Progress'],['K3 Incident','K3'],['Maintenance','Maint.'],['Join Application','Join'],['Procurement Request','RAB']].map(([v,l])=>(
                  <button key={v} onClick={()=>setSched(s=>({...s,filter:v}))}
                          className="px-3 py-2 text-xs font-bold transition-all"
                          style={{background:sched.filter===v?'#2E7AB8':'transparent',color:sched.filter===v?'#fff':'#5a7b9a'}}>
                    {l}
                  </button>
                ))}
              </div>
              <div className="flex rounded-xl overflow-hidden" style={{border:'1px solid rgba(46,122,184,.15)'}}>
                {[['all','Status'],['Pending','Pending'],['Approved','Approved'],['Rejected','Rejected'],['Completed','Done']].map(([v,l])=>(
                  <button key={v} onClick={()=>setFilterStatus(v)}
                          className="px-3 py-2 text-xs font-bold transition-all"
                          style={{background:filterStatus===v?'#2E7AB8':'transparent',color:filterStatus===v?'#fff':'#5a7b9a'}}>
                    {l}
                  </button>
                ))}
              </div>
              <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)}
                     className="px-3 py-2 text-xs rounded-xl font-medium outline-none"
                     style={{background:'#ffffff',border:'1px solid rgba(46,122,184,.15)',color:'#4a6b8a'}}/>
              <input type="text" placeholder="Search name..." value={filterName} onChange={e=>setFilterName(e.target.value)}
                     className="px-3 py-2 text-xs rounded-xl font-medium outline-none min-w-0"
                     style={{background:'#ffffff',border:'1px solid rgba(46,122,184,.15)',color:'#4a6b8a'}}/>
              {(filterDate||filterName||filterStatus!=='all')&&(
                <button onClick={()=>{setFilterDate('');setFilterName('');setFilterStatus('all');}}
                        className="px-3 py-2 text-xs font-bold rounded-xl transition-all hover:scale-105"
                        style={{background:'rgba(220,38,38,.1)',color:'#f87171',border:'1px solid rgba(220,38,38,.2)'}}>Reset</button>
              )}
            </div>
            <div className="flex-1 overflow-auto">
              {schedLoading?(
                <div className="flex items-center justify-center py-20">
                  <div className="flex flex-col items-center gap-4">
                    <div className="w-10 h-10 rounded-full border-2 animate-spin" style={{borderColor:'rgba(46,122,184,.4)',borderTopColor:'transparent'}}/>
                    <p className="text-sm" style={{color:'#5a7b9a'}}>Fetching data from Lab Calendar…</p>
                  </div>
                </div>
              ):schedData.length===0?(
                <div className="flex flex-col items-center justify-center py-20 gap-4">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" className="w-12 h-12" style={{color:'rgba(46,122,184,.25)'}}><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
                  <p className="text-base font-semibold" style={{color:'#4a6b8a'}}>No data found</p>
                  <p className="text-xs text-center max-w-xs" style={{color:'#8aa5bf'}}>Entries will appear here once submitted via the web forms and the Apps Script backend is connected.</p>
                  <a href="https://docs.google.com/spreadsheets/d/1q0Lf5cUFUfKvYpQX7wUuoUgQQB3FFp7vJGIMVGIgvfQ/edit" target="_blank" rel="noopener"
                     className="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold transition-all hover:scale-105"
                     style={{background:'rgba(46,122,184,.15)',color:'#6DB3E8',border:'1px solid rgba(46,122,184,.2)'}}>
                    {IC.external} Open Lab Calendar
                  </a>
                </div>
              ):(
                <table className="w-full text-sm border-collapse" style={{minWidth:'700px'}}>
                  <thead>
                    <tr style={{borderBottom:'1px solid rgba(46,122,184,.1)'}}>
                      {['ID','Date','Time','Name','Activity','Details','Room / Equipment','Status','Action'].map(h=>(
                        <th key={h} className="text-left px-5 py-3 text-xs font-black tracking-wider uppercase"
                            style={{color:'#8aa5bf',background:'#f8fbff',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {schedData.map((row,i)=>{
                      const badge=sBadge(row['Status']||'');
                      const ac=aColor[row['Activity']]||{bg:'rgba(46,122,184,.08)',c:'#4a6b8a'};
                      return(
                        <tr key={i} className="transition-colors" style={{borderBottom:'1px solid rgba(46,122,184,.06)'}}
                            onMouseEnter={e=>e.currentTarget.style.background='rgba(46,122,184,.03)'}
                            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                          <td className="px-5 py-3.5 font-mono text-xs" style={{color:'#8aa5bf',whiteSpace:'nowrap'}}>{row['ID']||'—'}</td>
                          <td className="px-5 py-3.5 font-semibold" style={{color:'#0c1f35',whiteSpace:'nowrap'}}>{fmtDate(row['Date'])}</td>
                          <td className="px-5 py-3.5 font-mono text-sm" style={{color:'#2E7AB8',whiteSpace:'nowrap'}}>{fmtTime(row['Time'])}</td>
                          <td className="px-5 py-3.5 font-semibold" style={{color:'#0c1f35',whiteSpace:'nowrap'}}>{row['Name']||'—'}</td>
                          <td className="px-5 py-3.5 whitespace-nowrap">
                            <span className="px-2.5 py-1 rounded-lg text-xs font-bold" style={{background:ac.bg,color:ac.c}}>{row['Activity']||'—'}</span>
                          </td>
                          <td className="px-5 py-3.5 max-w-xs truncate" style={{color:'#5a7b9a'}}>{row['Details']||'—'}</td>
                          <td className="px-5 py-3.5 whitespace-nowrap" style={{color:'#8aa5bf'}}>{row['Room/Equipment']||'—'}</td>
                          <td className="px-5 py-3.5 whitespace-nowrap">
                            <span className="px-2.5 py-1 rounded-full text-xs font-bold" style={{background:badge.bg,color:badge.c}}>{row['Status']||'—'}</span>
                          </td>
                          <td className="px-5 py-3.5 whitespace-nowrap">
                            {isAdmin?(
                              <div className="flex gap-1.5 items-center flex-wrap">
                                {row['Status']==='Pending'&&(<>
                                  <button
                                    disabled={!!actionLoading}
                                    onClick={()=>handleAction(row['ID'],'approve')}
                                    className="px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all hover:scale-105 disabled:opacity-40"
                                    style={{background:'rgba(58,139,62,.15)',color:'#22c55e',border:'1px solid rgba(58,139,62,.25)'}}>

                                  <button

                                    style={{background:'rgba(220,38,38,.1)',color:'#f87171',border:'1px solid rgba(220,38,38,.2)'}}>

function useScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById('scroll-progress');
    const fn=()=>{const h=document.documentElement.scrollHeight-window.innerHeight;if(bar)bar.style.width=(h>0?(window.scrollY/h)*100:0)+'%'};
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
}

/* Scroll-triggered motion wrapper */
const M=({children,className='',delay=0,y=50,once=true,amount=0.12,...rest})=>{
  const ref=useRef(null);
  if(!motion)return<div ref={ref} className={className} {...rest}>{children}</div>;
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y}}
      whileInView={{opacity:1,y:0}}
      viewport={{once,amount}}
      transition={{duration:1.1,delay,ease:[.23,1,.32,1]}}
      {...rest}
    >{children}</motion.div>
  );
};

/* Hero-specific (uses animate for first-paint trigger) */
const MH=({children,className='',delay=0,y=50})=>{
  const ref=useRef(null);
  const inView=useInView?useInView(ref,{once:true,amount:.05}):true;
  if(!motion)return<div ref={ref} className={className}>{children}</div>;
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y,scale:y>35?.97:1}}
      animate={inView?{opacity:1,y:0,scale:1}:{}}
      transition={{duration:1.3,delay,ease:[.23,1,.32,1]}}
    >{children}</motion.div>
  );
};

function Navigation(){
  const[scrolled,setScrolled]=useState(false);
  const[open,setOpen]=useState(false);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>60);window.addEventListener('scroll',fn,{passive:true});return()=>window.removeEventListener('scroll',fn)},[]);
  const links=[{l:'About',h:'#identity'},{l:'News',h:'#news'},{l:'Projects',h:'#projects'},{l:'Field Work',h:'#fieldwork'},{l:'Team',h:'#people'},{l:'Lab System',h:'#labsystem'},{l:'Legal',h:'#legal'},{l:'Contact',h:'#contact'}];

  const lc=scrolled?'#4a6b8a':'rgba(255,255,255,.7)';
  return(
    <nav className="fixed top-0 left-0 right-0 z-[9999] transition-all duration-500"
         style={{height:64,background:scrolled?'rgba(255,255,255,.97)':'transparent',backdropFilter:scrolled?'blur(20px)':'none',borderBottom:scrolled?'1px solid rgba(46,122,184,.1)':'none',boxShadow:scrolled?'0 1px 20px rgba(12,31,53,.07)':'none'}}>

        <a href="#hero" className="flex items-center gap-3 group">
          <img src="images/logo/logo.png" alt="Torgas Blue Energy" className="w-9 h-9 rounded-xl transition-transform duration-300 group-hover:scale-110"/>
          <span className="text-sm font-bold tracking-wide transition-all duration-500"
                style={{color:scrolled?'#0c1f35':'rgba(255,255,255,.9)',opacity:scrolled?1:0,transform:scrolled?'translateY(0)':'translateY(-3px)'}}>Torgas Blue Energy</span>
        </a>
        <div className="hidden lg:flex items-center gap-1">
          {links.map(({l,h})=>(
            <a key={h} href={h} className="text-sm font-medium px-4 py-2 rounded-full transition-all duration-300"
               style={{color:lc}}
               onMouseEnter={e=>e.currentTarget.style.background=scrolled?'rgba(46,122,184,.07)':'rgba(255,255,255,.1)'}
               onMouseLeave={e=>e.currentTarget.style.background='transparent'}>{l}</a>
          ))}
        </div>
        <button className="lg:hidden p-2 -mr-2" onClick={()=>setOpen(!open)} aria-label="Menu"
                style={{color:scrolled?'#0c1f35':'rgba(255,255,255,.9)'}}>
          {open?IC.x:IC.menu}
        </button>
      </div>
      {open&&(
        <div className="lg:hidden absolute top-16 left-0 right-0 backdrop-blur-2xl border-t px-6 py-6 shadow-xl"
             style={{background:'rgba(255,255,255,.97)',borderColor:'rgba(46,122,184,.1)'}}>
          {links.map(({l,h})=>(
            <a key={h} href={h} onClick={()=>setOpen(false)} className="block py-3.5 text-base font-semibold border-b"
               style={{color:'#2E7AB8',borderColor:'rgba(46,122,184,.08)'}}>{l}</a>
          ))}
        </div>
      )}
    </nav>
  );
}

const NEWS_CATEGORIES=['All','Research','Technology','Field Work','Events'];

function News(){
  const[news,setNews]=useState(STATIC_NEWS);
  const[loading,setLoading]=useState(false);
  const[cat,setCat]=useState('All');
  const[sel,setSel]=useState(null);
  const[idx,setIdx]=useState(0);
  const[dir,setDir]=useState(1);
  const pauseRef=useRef(false);
  const timerRef=useRef(null);

  useEffect(()=>{
    if(!WEBAPI_URL)return;
    setLoading(true);
    fetch(WEBAPI_URL+'?action=news')
      .then(r=>r.json())
      .then(d=>{if(d.success&&d.data&&d.data.length>0)setNews(d.data);})
      .catch(()=>{})
      .finally(()=>setLoading(false));
  },[]);

  const filtered=cat==='All'?news:news.filter(n=>n.category===cat);
  useEffect(()=>setIdx(0),[cat]);

  useEffect(()=>{
    clearInterval(timerRef.current);
    timerRef.current=setInterval(()=>{
      if(!pauseRef.current&&filtered.length>1){setDir(1);setIdx(i=>(i+1)%filtered.length);}
    },6000);
    return()=>clearInterval(timerRef.current);
  },[filtered.length]);

  const go=(n,d)=>{setDir(d);setIdx(n);};
  const prev=()=>go((idx-1+filtered.length)%filtered.length,-1);
  const next=()=>go((idx+1)%filtered.length,1);

  useEffect(()=>{
    const fn=e=>{if(e.key==='ArrowLeft')prev();if(e.key==='ArrowRight')next();};
    window.addEventListener('keydown',fn);return()=>window.removeEventListener('keydown',fn);
  },[idx,filtered.length]);

  const catColors={'Research':'#2E7AB8','Technology':'#E8812F','Field Work':'#3A8B3E','Events':'#9B6EE8'};
  const fmtDate=d=>{try{const dt=new Date(d);if(isNaN(dt))return d;const dd=String(dt.getDate()).padStart(2,'0');const mm=String(dt.getMonth()+1).padStart(2,'0');return`${dd}/${mm}/${dt.getFullYear()}`;}catch{return d;}};
  const cur=filtered[idx]||filtered[0];

  return(
    <section id="news" className="relative py-28 md:py-36" style={{background:'#f4f9ff'}}>
      <div className="max-w-7xl mx-auto px-6 lg:px-10">

        <M>
          <div className="flex items-center gap-5 mb-4">
            <div className="flex-1 h-px" style={{background:'rgba(46,122,184,.2)'}}/>
            <span className="text-xs font-black tracking-[.28em] uppercase" style={{color:'#2E7AB8'}}>Latest from the Field</span>
            <div className="flex-1 h-px" style={{background:'rgba(46,122,184,.2)'}}/>
          </div>
          <h2 className="text-center text-4xl sm:text-5xl md:text-6xl font-black leading-tight mb-3"
              style={{letterSpacing:'-0.04em',color:'#0c1f35'}}>News &amp; Updates</h2>
          <p className="text-center text-base max-w-lg mx-auto mb-10" style={{color:'#5a7b9a'}}>Research milestones, field dispatches, and technology breakthroughs.</p>
        </M>

        <M delay={.08}>
          <div className="flex items-center justify-center gap-2 flex-wrap mb-10">
            {NEWS_CATEGORIES.map(c=>(
              <button key={c} onClick={()=>setCat(c)}
                className="px-5 py-2 rounded-full text-sm font-semibold transition-all duration-300"
                style={{background:cat===c?'#2E7AB8':'rgba(46,122,184,.07)',color:cat===c?'#fff':'#4a6b8a',border:`1px solid ${cat===c?'#2E7AB8':'rgba(46,122,184,.18)'}`}}>
                {c}
              </button>
            ))}
          </div>
        </M>

        {loading&&(
          <div className="flex justify-center py-24">
            <div className="w-8 h-8 rounded-full border-2 animate-spin" style={{borderColor:'rgba(46,122,184,.2)',borderTopColor:'#2E7AB8'}}/>
          </div>
        )}

        {!loading&&cur&&(
          <div className="relative"
               onMouseEnter={()=>{pauseRef.current=true;}}
               onMouseLeave={()=>{pauseRef.current=false;}}>

            {AnimatePresence?(
              <AnimatePresence mode="wait" custom={dir}>
                <motion.div key={cur.id||idx}
                  custom={dir}
                  initial={d=>({opacity:0,x:d*48})}
                  animate={{opacity:1,x:0}}
                  exit={d=>({opacity:0,x:d*-48})}
                  transition={{duration:.5,ease:[.23,1,.32,1]}}>
                  <NewsSlide cur={cur} onOpen={()=>setSel(cur)} catColors={catColors} fmtDate={fmtDate}/>
                </motion.div>
              </AnimatePresence>
            ):(
              <NewsSlide cur={cur} onOpen={()=>setSel(cur)} catColors={catColors} fmtDate={fmtDate}/>
            )}

            {filtered.length>1&&(
              <>
                <button className="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-5 w-11 h-11 rounded-full flex items-center justify-center z-10 transition-all duration-300 hover:scale-110 shadow-lg hidden md:flex"
                        style={{background:'#ffffff',color:'#2E7AB8',border:'1px solid rgba(46,122,184,.2)',boxShadow:'0 4px 16px rgba(12,31,53,.12)'}}
                        onClick={e=>{e.stopPropagation();prev();}}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button className="absolute right-0 top-1/2 -translate-y-1/2 translate-x-5 w-11 h-11 rounded-full flex items-center justify-center z-10 transition-all duration-300 hover:scale-110 hidden md:flex"
                        style={{background:'#ffffff',color:'#2E7AB8',border:'1px solid rgba(46,122,184,.2)',boxShadow:'0 4px 16px rgba(12,31,53,.12)'}}
                        onClick={e=>{e.stopPropagation();next();}}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4"><path d="M9 18l6-6-6-6"/></svg>
                </button>
              </>
            )}
          </div>
        )}

        {!loading&&filtered.length===0&&(
          <div className="text-center py-20" style={{color:'#8aa5bf'}}>
            <p className="text-4xl mb-3">📰</p>
