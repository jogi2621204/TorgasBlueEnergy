/* ══════════════ HOOKS ══════════════ */
function useScrollProgress(){
  useEffect(()=>{
    const bar=document.getElementById('scroll-progress');
    const fn=()=>{const h=document.documentElement.scrollHeight-window.innerHeight;if(bar)bar.style.width=(h>0?(window.scrollY/h)*100:0)+'%'};
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);
}

/* Scroll-triggered motion wrapper */
const M=({children,className='',delay=0,y=50,once=true,amount=0.12,...rest})=>{
  const ref=useRef(null);
  if(!motion)return<div ref={ref} className={className} {...rest}>{children}</div>;
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y}}
      whileInView={{opacity:1,y:0}}
      viewport={{once,amount}}
      transition={{duration:1.1,delay,ease:[.23,1,.32,1]}}
      {...rest}
    >{children}</motion.div>
  );
};

/* Hero-specific (uses animate for first-paint trigger) */
const MH=({children,className='',delay=0,y=50})=>{
  const ref=useRef(null);
  const inView=useInView?useInView(ref,{once:true,amount:.05}):true;
  if(!motion)return<div ref={ref} className={className}>{children}</div>;
  return(
    <motion.div ref={ref} className={className}
      initial={{opacity:0,y,scale:y>35?.97:1}}
      animate={inView?{opacity:1,y:0,scale:1}:{}}
      transition={{duration:1.3,delay,ease:[.23,1,.32,1]}}
    >{children}</motion.div>
  );
};

function Navigation(){
  const[scrolled,setScrolled]=useState(false);
  const[open,setOpen]=useState(false);
  useEffect(()=>{const fn=()=>setScrolled(window.scrollY>60);window.addEventListener('scroll',fn,{passive:true});return()=>window.removeEventListener('scroll',fn)},[]);
  const links=[{l:'About',h:'#identity'},{l:'Innovation',h:'#innovation'},{l:'Projects',h:'#projects'},{l:'Field Work',h:'#fieldwork'},{l:'Team',h:'#people'},{l:'Legal',h:'#legal'},{l:'Contact',h:'#contact'}];

  return(
    <nav className={`fixed top-0 left-0 right-0 z-[9999] transition-all duration-700 ${scrolled?'bg-brand-dark/90 backdrop-blur-2xl shadow-lg shadow-black/30':'bg-transparent'}`} style={{height:64}}>
      <div className="max-w-7xl mx-auto px-6 lg:px-10 h-full flex items-center justify-between">
        <a href="#hero" className="flex items-center gap-3 group">
          <img src="images/logo/logo.png" alt="Torgas Blue Energy" className="w-9 h-9 rounded-xl transition-transform duration-300 group-hover:scale-110"/>
          <span className={`text-sm font-bold tracking-wide transition-all duration-500 ${scrolled?'opacity-100 translate-y-0':'opacity-0 -translate-y-1'}`}>Torgas Blue Energy</span>
        </a>
        <div className="hidden lg:flex items-center gap-1">
          {links.map(({l,h})=>(
            <a key={h} href={h} className="text-sm font-medium px-5 py-2 rounded-full transition-all duration-300 hover:bg-white/[.08]" style={{color:'rgba(255,255,255,.55)'}}>{l}</a>
          ))}
        </div>
        <button className="lg:hidden p-2 -mr-2" onClick={()=>setOpen(!open)} aria-label="Menu">
          {open?IC.x:IC.menu}
        </button>
      </div>
      {open&&(
        <div className="lg:hidden absolute top-16 left-0 right-0 bg-brand-dark/95 backdrop-blur-2xl border-t border-white/5 px-6 py-6 shadow-2xl">
          {links.map(({l,h})=>(
            <a key={h} href={h} onClick={()=>setOpen(false)} className="block py-3.5 text-base font-medium border-b border-white/5" style={{color:'rgba(255,255,255,.65)'}}>{l}</a>
          ))}
        </div>
      )}
    </nav>
  );
}

function People(){
  const founder=PEOPLE.filter(p=>p.level==='founder');
  const cLevel=PEOPLE.filter(p=>p.level==='c-level');
  const team=PEOPLE.filter(p=>p.level==='team');
  const interns=PEOPLE.filter(p=>p.level==='intern');
  const[active,setActive]=useState(null);

  useEffect(()=>{
    if(!active)return;
    const onKey=e=>{if(e.key==='Escape')setActive(null)};
    document.addEventListener('keydown',onKey);
    document.body.style.overflow='hidden';
    return()=>{document.removeEventListener('keydown',onKey);document.body.style.overflow=''};
  },[active]);

  const Card=({person,size='md',delay=0,accent='blue'})=>{
    const isLg=size==='lg';
    const accentMap={blue:'#2E7AB8',orange:'#E8812F',green:'#3A8B3E',gray:'rgba(255,255,255,.4)'};
    const ac=accentMap[accent];
    return(
      <M delay={delay}>
        <button onClick={()=>setActive(person)}
          className="team-card group block w-full text-left focus:outline-none">
          <div className={`relative overflow-hidden ${isLg?'aspect-[3/4]':'aspect-[3/4]'}`}
               style={{background:'#0d1a2e'}}>
            <img src={person.head} alt={person.name} loading="lazy"
              className="absolute inset-0 w-full h-full object-cover object-top grayscale group-hover:grayscale-0 transition-all duration-[900ms] ease-out group-hover:scale-[1.04]"
              style={{filter:'grayscale(100%) contrast(1.05)'}}
              onError={e=>{e.target.style.display='none'}}/>
            <div className="absolute inset-0 transition-opacity duration-700 group-hover:opacity-0 mix-blend-multiply"
                 style={{background:`linear-gradient(180deg,transparent 40%,${ac}cc 100%)`}}/>
            <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-700"
                 style={{background:`linear-gradient(180deg,transparent 55%,rgba(6,14,26,.92) 100%)`}}/>
            <div className="absolute bottom-0 left-0 right-0 p-5 md:p-6">
              <div className="h-px w-8 mb-3 transition-all duration-500 group-hover:w-16" style={{background:ac}}/>
              <h4 className={`font-black leading-[1.05] tracking-tight text-white ${isLg?'text-2xl md:text-3xl':'text-lg md:text-xl'}`} style={{fontFamily:"'Playfair Display',Georgia,serif"}}>{person.name}</h4>
              <p className={`mt-2 font-medium tracking-wide uppercase text-white/90 ${isLg?'text-xs':'text-[10px]'}`}>{person.role}</p>
            </div>
          </div>
        </button>
      </M>
    );
  };

  return(
    <section id="people" className="relative py-32 md:py-44" style={{background:'#0a1628'}}>
      <div className="max-w-7xl mx-auto px-6 lg:px-10">

          <M><p className="text-sm font-bold tracking-[.2em] uppercase mb-5" style={{color:'#2E7AB8'}}>Meet the Team</p></M>
          <M delay={.1}><h2 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black tracking-tight" style={{fontFamily:"'Playfair Display',Georgia,serif"}}>Built by Experts</h2></M>
          <M delay={.2}><p className="mt-5 text-lg md:text-xl max-w-xl mx-auto" style={{color:'rgba(255,255,255,.35)'}}>A multidisciplinary team of marine scientists, engineers, and strategists. Click any portrait to learn more.</p></M>
        </div>

        {/* Founder */}
        <div className="mb-24">
          <M><p className="text-center text-xs font-bold tracking-[.25em] uppercase mb-10" style={{color:'rgba(255,255,255,.25)'}}>— Founder —</p></M>
          <div className="grid grid-cols-1 max-w-sm mx-auto">{founder.map((p,i)=><Card key={p.id} person={p} size="lg" delay={i*.1} accent="orange"/>)}</div>
        </div>

        {/* C-Level */}
        <div className="mb-24">
          <M><p className="text-center text-xs font-bold tracking-[.25em] uppercase mb-10" style={{color:'rgba(255,255,255,.25)'}}>— Leadership —</p></M>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-5 md:gap-7">{cLevel.map((p,i)=><Card key={p.id} person={p} size="lg" delay={i*.08} accent="blue"/>)}</div>
        </div>

        {/* Research Team */}
        <div className="mb-24">
          <M><p className="text-center text-xs font-bold tracking-[.25em] uppercase mb-10" style={{color:'rgba(255,255,255,.25)'}}>— Research Team —</p></M>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5 md:gap-7">{team.map((p,i)=><Card key={p.id} person={p} size="md" delay={i*.05} accent="green"/>)}</div>
        </div>

        {/* Interns */}
        <div>
          <M><p className="text-center text-xs font-bold tracking-[.25em] uppercase mb-10" style={{color:'rgba(255,255,255,.25)'}}>— Research Interns —</p></M>
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-5 md:gap-6">{interns.map((p,i)=><Card key={p.id} person={p} size="md" delay={i*.05} accent="gray"/>)}</div>
        </div>
      </div>

      {/* MODAL */}
      {active&&(
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-8" style={{background:'rgba(6,14,26,.85)',backdropFilter:'blur(20px)'}} onClick={()=>setActive(null)}>

            {/* LEFT — body shot (full, no crop) */}
            <div className="md:w-[45%] flex items-center justify-center" style={{background:'#060e1a',maxHeight:'92vh'}}>
              <img src={active.body} alt={active.name} loading="lazy" className="block w-full h-auto max-h-[50vh] md:max-h-[92vh] object-contain" onError={e=>{e.target.style.display='none'}}/>
            </div>
            {/* RIGHT — info + CV */}
            <div className="md:w-[55%] p-8 md:p-12 overflow-y-auto flex flex-col justify-center">
              <p className="text-xs font-bold tracking-[.25em] uppercase mb-4" style={{color:'#2E7AB8'}}>{active.role}</p>
              <h3 className="text-3xl md:text-4xl lg:text-5xl font-black leading-[1.05] tracking-tight mb-4" style={{fontFamily:"'Playfair Display',Georgia,serif"}}>{active.name}</h3>
              <div className="h-px w-16 mb-6" style={{background:'#2E7AB8'}}/>
              <p className="text-base md:text-lg leading-relaxed mb-8" style={{color:'rgba(255,255,255,.6)'}}>{active.expertise}</p>
              {active.cv?(
                <a href={active.cv} target="_blank" rel="noopener" className="inline-flex items-center gap-3 px-6 py-4 rounded-full font-semibold text-base transition-all hover:scale-[1.02] self-start" style={{background:'#2E7AB8',color:'#fff'}}>

                  View Curriculum Vitae

              ):(
                <p className="text-sm italic" style={{color:'rgba(255,255,255,.3)'}}>CV available upon request.</p>
              )}
            </div>
          </div>
        </div>
      )}
    </section>
  );
